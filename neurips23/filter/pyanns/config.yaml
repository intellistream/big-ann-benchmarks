random-filter-s:
  pyanns:
    docker-tag: neurips23-filter-pyanns
    module: neurips23.filter.pyanns.pyanns
    constructor: Pyanns
    base-args: ["@metric"]
    run-groups:
      base:
        args: |
          [{"indexkey": "IVF1024,SQ8"}]
        query-args: |
          [{"nprobe": 1},
            {"nprobe":2},
            {"nprobe":4}]
random-s:
  pyanns:
    docker-tag: neurips23-filter-pyanns
    module: neurips23.filter.pyanns.pyanns
